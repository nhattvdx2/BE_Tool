services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: be-tool-backend
    env_file:
      - .env
    environment:
      SERVE_ADMIN_UI: "false"
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  admin:
    image: nginx:1.27-alpine
    container_name: be-tool-admin
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${ADMIN_PORT:-8080}:80"
    volumes:
      - ./deploy/admin.nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/templates/admin/index.html:/usr/share/nginx/html/index.html:ro
      - ./app/static/admin:/usr/share/nginx/html/static:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
